<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Element Capture</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green: #00ff88;
      --green-dim: #00cc6a;
      --green-dark: #00994d;
      --purple: #7c3aed;
      --bg: #08080f;
      --card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f0f0f0;
      --text-muted: rgba(255, 255, 255, 0.4);
    }

    html, body {
      width: 320px;
      background: transparent;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: var(--bg);
      overflow: hidden;
      animation: bodyIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes bodyIn {
      from { opacity: 0; transform: translateY(-6px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    .wrapper {
      padding: 20px;
      position: relative;
    }

    /* Ambient glow behind the card */
    .wrapper::before {
      content: '';
      position: absolute;
      top: -40px; left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 200px;
      background: radial-gradient(ellipse, rgba(0, 255, 136, 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* Subtle top-border shimmer */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(0,255,136,0.25) 0%, rgba(124,58,237,0.2) 50%, transparent 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      pointer-events: none;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #00cc6a, #7c3aed);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(0, 255, 136, 0.3);
    }

    .logo svg {
      width: 18px; height: 18px;
    }

    .title-group {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .status-dot.active {
      background: var(--green);
      box-shadow: 0 0 8px var(--green), 0 0 16px rgba(0,255,136,0.4);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 6px var(--green), 0 0 12px rgba(0,255,136,0.3); }
      50%       { box-shadow: 0 0 12px var(--green), 0 0 24px rgba(0,255,136,0.5); }
    }

    .status-text {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
      transition: color 0.3s ease;
    }

    .status-text.active {
      color: var(--green);
      font-weight: 500;
    }

    .capture-btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: #fff;
      background: linear-gradient(135deg, #00994d 0%, #00cc6a 50%, #00ff88 100%);
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 0 20px rgba(0,255,136,0.25), 0 2px 8px rgba(0,0,0,0.4);
    }

    .capture-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .capture-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 28px rgba(0,255,136,0.4), 0 4px 16px rgba(0,0,0,0.4);
    }

    .capture-btn:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 0 14px rgba(0,255,136,0.25);
    }

    .capture-btn.scanning {
      background: linear-gradient(135deg, #4c1d95 0%, #7c3aed 50%, #9f67ff 100%);
      box-shadow: 0 0 20px rgba(124,58,237,0.35), 0 2px 8px rgba(0,0,0,0.4);
      animation: scanningBtn 2s ease-in-out infinite;
    }

    .capture-btn.scanning:hover {
      box-shadow: 0 0 32px rgba(124,58,237,0.5), 0 4px 16px rgba(0,0,0,0.4);
    }

    @keyframes scanningBtn {
      0%, 100% { box-shadow: 0 0 20px rgba(124,58,237,0.35), 0 2px 8px rgba(0,0,0,0.4); }
      50%       { box-shadow: 0 0 32px rgba(124,58,237,0.55), 0 2px 8px rgba(0,0,0,0.4); }
    }

    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      position: relative;
      z-index: 1;
    }

    .btn-icon {
      width: 16px; height: 16px;
      transition: transform 0.3s ease;
    }

    .capture-btn.scanning .btn-icon {
      animation: spinIcon 2.5s linear infinite;
    }

    @keyframes spinIcon {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .hint {
      margin-top: 12px;
      font-size: 10.5px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
      transition: opacity 0.3s ease;
    }

    .hint span {
      display: inline-block;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: 'SFMono-Regular', 'Consolas', monospace;
      color: rgba(255,255,255,0.5);
      margin: 0 1px;
    }

    .feedback {
      margin-top: 10px;
      font-size: 11px;
      text-align: center;
      color: var(--green);
      opacity: 0;
      transition: opacity 0.3s ease;
      min-height: 16px;
      font-weight: 500;
    }

    .feedback.show {
      opacity: 1;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .footer-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--text-muted);
      opacity: 0.4;
    }

    .footer-text {
      font-size: 9.5px;
      color: var(--text-muted);
      opacity: 0.4;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="header">
        <div class="logo">
          <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 5V3.5C2 2.67 2.67 2 3.5 2H5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M13 2H14.5C15.33 2 16 2.67 16 3.5V5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M16 13V14.5C16 15.33 15.33 16 14.5 16H13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M5 16H3.5C2.67 16 2 15.33 2 14.5V13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="9" cy="9" r="3" stroke="white" stroke-width="1.5"/>
            <circle cx="9" cy="9" r="1" fill="white"/>
          </svg>
        </div>
        <div class="title-group">
          <span class="title">Element Capture</span>
          <span class="subtitle">AI Screenshot Tool</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="status-row">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Ready to capture</span>
      </div>

      <button class="capture-btn" id="captureBtn">
        <div class="btn-inner">
          <svg class="btn-icon" id="btnIcon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1.5 4V3C1.5 2.17 2.17 1.5 3 1.5H4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M12 1.5H13C13.83 1.5 14.5 2.17 14.5 3V4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M14.5 12V13C14.5 13.83 13.83 14.5 13 14.5H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M4 14.5H3C2.17 14.5 1.5 13.83 1.5 13V12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span id="btnText">Capture Element</span>
        </div>
      </button>

      <p class="hint" id="hint">Hover over any element, then click to capture it as PNG</p>

      <div class="feedback" id="feedback"></div>

      <div class="footer">
        <div class="footer-dot"></div>
        <span class="footer-text">Press <span>Esc</span> to cancel</span>
        <div class="footer-dot"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

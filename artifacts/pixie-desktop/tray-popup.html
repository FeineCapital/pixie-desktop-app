<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pixie</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { width: 320px; margin: 0; padding: 0; background: #171717 !important; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #171717 !important;
      overflow: hidden;
    }

    .wrap {
      padding: 16px 16px 12px;
      display: flex; flex-direction: column; gap: 10px;
      background: #171717;
    }

    .header { display: flex; align-items: center; gap: 12px; padding: 0 4px 4px; }
    .logo { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; overflow: hidden; }
    .logo img { width: 100%; height: 100%; border-radius: 8px; filter: brightness(0) invert(1); }
    .title { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.01em; }
    .sub   { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 1px; }

    .modes { display: flex; flex-direction: column; gap: 5px; }

    .mode-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .mode-row:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.1); }

    .mode-icon {
      width: 36px; height: 36px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      color: rgba(255,255,255,0.5);
    }

    .mode-info { flex: 1; min-width: 0; }
    .mode-name { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.8); letter-spacing: -0.01em; }
    .mode-desc { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 1px; }

    .mode-keys {
      display: flex; align-items: center; gap: 2px; flex-shrink: 0;
    }

    .key {
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom-width: 2px;
      border-radius: 5px;
      padding: 2px 6px;
      font-family: 'SFMono-Regular', 'Consolas', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      line-height: 1;
      white-space: nowrap;
    }

    .sep { height: 1px; background: rgba(255,255,255,0.06); margin: 2px 4px; }

    .footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 2px 4px 0;
    }
    .footer-txt { font-size: 10px; color: rgba(255,255,255,0.15); }
    .quit-btn {
      font-size: 10px; color: rgba(255,255,255,0.25);
      background: none; border: none; cursor: pointer;
      font-family: inherit; padding: 2px 6px; border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .quit-btn:hover { color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.06); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="logo"><img src="icon.png" alt="Pixie"></div>
      <div>
        <div class="title">Pixie</div>
        <div class="sub">Screenshot tool</div>
      </div>
    </div>

    <div class="modes">
      <div class="mode-row" id="row-click">
        <div class="mode-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2v4M2 6h4M18 2v4M18 6h4M6 18v4M6 18H2M18 18v4M18 18h4"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <div class="mode-info">
          <div class="mode-name">Click to capture</div>
          <div class="mode-desc">Hover element, click to copy</div>
        </div>
        <div class="mode-keys"><span class="key">&#x2318;</span><span class="key">&#x21E7;</span><span class="key">6</span></div>
      </div>

      <div class="mode-row" id="row-drag">
        <div class="mode-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" stroke-dasharray="4 2"/>
          </svg>
        </div>
        <div class="mode-info">
          <div class="mode-name">Click to drag</div>
          <div class="mode-desc">Draw area, then copy or save</div>
        </div>
        <div class="mode-keys"><span class="key">&#x2318;</span><span class="key">&#x21E7;</span><span class="key">7</span></div>
      </div>

      <div class="mode-row" id="row-full">
        <div class="mode-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <path d="M8 21h8M12 17v4"/>
          </svg>
        </div>
        <div class="mode-info">
          <div class="mode-name">Full screen shot</div>
          <div class="mode-desc">Capture entire visible screen</div>
        </div>
        <div class="mode-keys"><span class="key">&#x2318;</span><span class="key">&#x21E7;</span><span class="key">8</span></div>
      </div>
    </div>

    <div class="sep"></div>

    <div class="footer">
      <span class="footer-txt">Esc to cancel anytime</span>
      <button class="quit-btn" id="quit-btn">Quit Pixie</button>
    </div>
  </div>

  <script>
    document.getElementById('row-click').addEventListener('click', () => window.pixieTray.action('click'));
    document.getElementById('row-drag').addEventListener('click', () => window.pixieTray.action('drag'));
    document.getElementById('row-full').addEventListener('click', () => window.pixieTray.action('full'));
    document.getElementById('quit-btn').addEventListener('click', () => window.pixieTray.action('quit'));
  </script>
</body>
</html>

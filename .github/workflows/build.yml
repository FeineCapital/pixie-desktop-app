name: Build Pixie for Mac

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run dist -- --publish never
      - name: Rename DMG
        run: mv dist/*.dmg dist/Pixie.dmg
      - name: Publish Release
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest dist/Pixie.dmg \
            --title "Pixie for Mac" \
            --notes "Download Pixie.dmg, open it, and drag Pixie to your Applications folder." \
            --latest
